name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --tests --examples -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # The full workspace builds on all three OSes, Windows included: the
    # `zmq` crate's vendored zeromq C++ source compiles under native MSVC
    # (zmq-sys builds it from source, no system libzmq needed), so the
    # `host -> qs -> zmq` chain behind mini-beamline-qs is fine here. (The
    # POSIX-header gap only bites the windows-gnu *cross* target, which CI
    # does not use.)
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --no-fail-fast
      - run: cargo build --workspace --release
      - run: cargo run --example async_count --quiet
      - run: cargo run --example sync_count --quiet
      - run: cargo run --example scan_motor --quiet

  # Verify each opt-in feature of the consolidated `bsrs` crate compiles
  # and its tests pass. Default CI runs without these features so the
  # matrix above stays fast; this job catches feature-gated regressions.
  features:
    name: opt-in features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # zmq / qs / metrics / cli all link the ZMQ transport — needs libzmq.
      - name: install libzmq
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev pkg-config
      # ZMQ document sink.
      - name: test bsrs --features zmq
        run: cargo test -p bsrs --features zmq --no-fail-fast
      # Tiled document sink — pulls in tiled-rs (HTTP).
      - name: test bsrs --features tiled
        run: cargo test -p bsrs --features tiled --no-fail-fast
      # Lua `tiled.*` read-side bindings, exercised through the CLI/REPL.
      - name: test bsrs --features cli,tiled
        run: cargo test -p bsrs --features cli,tiled --no-fail-fast
      # Kafka document sink — pure-Rust kafka crate, no librdkafka.
      - name: test bsrs --features kafka
        run: cargo test -p bsrs --features kafka --no-fail-fast
      # Queue-server daemon + Prometheus metrics endpoint (metrics -> qs).
      - name: test bsrs --features metrics
        run: cargo test -p bsrs --features metrics --no-fail-fast
      # HDF5 detector frame sink — pure-Rust rust-hdf5, no system libhdf5.
      - name: test bsrs --features hdf5
        run: cargo test -p bsrs --features hdf5 --no-fail-fast
      # Real EPICS CA backend — pulls in epics-ca-rs + epics-base-rs.
      # Build-only for now (live IOC integration deferred to a
      # dedicated job that needs a softIoc subprocess).
      - name: build bsrs --features ca
        run: cargo build -p bsrs --features ca
      # Real EPICS PVA backend — pulls in epics-pva-rs.
      - name: build bsrs --features pva
        run: cargo build -p bsrs --features pva
      # Wired `bsrs frame-source` (CLI + PVA monitor source + HDF5 sink).
      - name: build bsrs --features frame-source
        run: cargo build -p bsrs --features frame-source
